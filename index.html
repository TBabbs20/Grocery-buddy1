<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Grocery Buddy</title>
<meta name="description" content="Your personal grocery assistant" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1B2E22" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  body { margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ---------- ICONS (inline SVG, no external icon library needed) ---------- */
function Icon({ children, size = 16, color, strokeWidth = 2, style, ...rest }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"}
         strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style} {...rest}>
      {children}
    </svg>
  );
}
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>;
const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Icon>;
const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12" /></Icon>;
const Trash2 = (p) => (
  <Icon {...p}>
    <polyline points="3 6 5 6 21 6" />
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
    <path d="M10 11v6" /><path d="M14 11v6" />
    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
  </Icon>
);
const ShoppingCart = (p) => (
  <Icon {...p}>
    <circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" />
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
  </Icon>
);
const Package = (p) => (
  <Icon {...p}>
    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
    <polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" />
  </Icon>
);
const ChefHat = (p) => (
  <Icon {...p}>
    <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" />
    <line x1="6" y1="17" x2="18" y2="17" />
  </Icon>
);
const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></Icon>;
const ArrowRight = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></Icon>;
const Minus = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12" /></Icon>;

/* ---------- THEME ---------- */
const T = {
  bg: "#1B2E22", bgPanel: "#22392A", paper: "#F4EFDE", paperDim: "#EAE2C8",
  ink: "#2A2A22", inkSoft: "#5B5A47", mustard: "#D9A62E", mustardDark: "#B78620",
  tomato: "#C1543F", sage: "#8FA988", cream: "#F4EFDE", line: "rgba(244,239,222,0.14)",
};

const DEFAULT_CATEGORIES = ["Produce", "Dairy & Eggs", "Meat & Protein", "Grains & Pasta", "Canned & Jarred", "Spices & Condiments", "Other"];

const RECIPES = [
  { id: "r1", name: "Tomato Garlic Pasta", time: "20 min", ingredients: ["spaghetti", "tomato", "garlic", "olive oil", "parmesan", "basil"], instructions: "Boil the pasta until al dente. Meanwhile, sauté sliced garlic in olive oil until fragrant, add chopped tomato and simmer until it breaks down. Toss with the drained pasta, top with parmesan and torn basil." },
  { id: "r2", name: "Veggie Fried Rice", time: "25 min", ingredients: ["rice", "egg", "soy sauce", "carrot", "peas", "garlic", "green onion"], instructions: "Scramble the egg in a hot pan or wok and set aside. Sauté garlic, diced carrot, and peas until tender. Add cold cooked rice, breaking up clumps, then stir in soy sauce and the scrambled egg. Finish with sliced green onion." },
  { id: "r3", name: "Chicken Stir Fry", time: "30 min", ingredients: ["chicken breast", "soy sauce", "garlic", "ginger", "bell pepper", "broccoli", "rice"], instructions: "Slice chicken thin and stir-fry in a hot pan until cooked through. Add garlic and ginger, then bell pepper and broccoli, cooking until crisp-tender. Stir in soy sauce and serve over rice." },
  { id: "r4", name: "Black Bean Tacos", time: "20 min", ingredients: ["black beans", "tortilla", "onion", "cheese", "lime", "cilantro"], instructions: "Warm the black beans with diced onion until heated through, mashing slightly. Warm the tortillas, fill with the bean mixture, cheese, and cilantro, and finish with a squeeze of lime." },
  { id: "r5", name: "Lentil Soup", time: "40 min", ingredients: ["lentils", "onion", "carrot", "celery", "garlic", "vegetable broth", "cumin"], instructions: "Sauté onion, carrot, celery, and garlic until softened. Add lentils, vegetable broth, and cumin, then simmer until the lentils are tender, about 25 minutes." },
  { id: "r6", name: "Grilled Cheese & Tomato Soup", time: "15 min", ingredients: ["bread", "cheese", "butter", "canned tomato", "onion", "garlic"], instructions: "Simmer canned tomato with sautéed onion and garlic, then blend until smooth. Butter the bread, fill with cheese, and grill in a pan until golden on both sides. Serve alongside the soup." },
  { id: "r7", name: "Veggie Omelette", time: "10 min", ingredients: ["egg", "cheese", "onion", "bell pepper", "butter", "milk"], instructions: "Whisk eggs with a splash of milk. Sauté onion and bell pepper in butter until soft, pour in the eggs, and cook gently. Add cheese, fold, and cook until just set." },
  { id: "r8", name: "Chickpea Curry", time: "35 min", ingredients: ["chickpeas", "onion", "garlic", "ginger", "coconut milk", "curry powder", "tomato"], instructions: "Sauté onion, garlic, and ginger, then stir in curry powder until fragrant. Add tomato, chickpeas, and coconut milk, and simmer until thickened, about 20 minutes." },
  { id: "r9", name: "Fluffy Pancakes", time: "20 min", ingredients: ["flour", "egg", "milk", "sugar", "baking powder", "butter"], instructions: "Whisk together flour, sugar, and baking powder. In another bowl, mix egg, milk, and melted butter, then combine with the dry ingredients until just mixed. Cook spoonfuls on a hot buttered griddle until bubbles form, then flip." },
  { id: "r10", name: "Caprese Salad", time: "10 min", ingredients: ["tomato", "mozzarella", "basil", "olive oil", "balsamic vinegar"], instructions: "Slice tomato and mozzarella and arrange alternately on a plate. Tuck in basil leaves, drizzle with olive oil and balsamic vinegar, and season to taste." },
  { id: "r11", name: "Beef Tacos", time: "25 min", ingredients: ["ground beef", "tortilla", "onion", "cheese", "lettuce", "tomato", "taco seasoning"], instructions: "Brown the ground beef with diced onion, then stir in taco seasoning. Warm the tortillas and fill with the beef, cheese, lettuce, and diced tomato." },
  { id: "r12", name: "Peanut Butter Noodles", time: "15 min", ingredients: ["noodles", "peanut butter", "soy sauce", "garlic", "honey", "green onion"], instructions: "Cook the noodles and reserve a splash of the cooking water. Whisk peanut butter, soy sauce, minced garlic, and honey with the reserved water until smooth. Toss with the noodles and top with green onion." },
];

const norm = (s) => s.trim().toLowerCase();
const fuzzyHas = (pantryNames, ingredient) => {
  const ing = norm(ingredient);
  return pantryNames.some((p) => p.includes(ing) || ing.includes(p));
};

/* ---------- SHARED (SUPABASE) STORAGE ---------- */
const SUPABASE_READY = !!(window.SUPABASE_URL && window.SUPABASE_URL !== "YOUR_SUPABASE_PROJECT_URL" && window.supabase);
const supabaseClient = SUPABASE_READY ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

async function loadAllKeys() {
  if (!supabaseClient) return {};
  try {
    const { data, error } = await supabaseClient.from("household_data").select("key,value");
    if (error || !data) return {};
    const map = {};
    data.forEach((row) => { map[row.key] = row.value; });
    return map;
  } catch {
    return {};
  }
}
async function saveKeyRemote(key, value) {
  if (!supabaseClient) throw new Error("Supabase not configured");
  const { error } = await supabaseClient
    .from("household_data")
    .upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: "key" });
  if (error) throw error;
}

let idCounter = 1;
const uid = () => `id${Date.now()}${idCounter++}`;

/* ---------- MAIN APP ---------- */
function GroceryBuddy() {
  const [tab, setTab] = useState("grocery");
  const [grocery, setGrocery] = useState([]);
  const [pantry, setPantry] = useState([]);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [customRecipes, setCustomRecipes] = useState([]);
  const [ready, setReady] = useState(false);
  const [saveErr, setSaveErr] = useState(false);

  useEffect(() => {
    let cancelled = false;
    const timeout = setTimeout(() => { if (!cancelled) setReady(true); }, 3000);
    (async () => {
      const map = await loadAllKeys();
      if (cancelled) return;
      clearTimeout(timeout);
      setGrocery(map["grocery-list"] || []);
      setPantry(map["pantry-inventory"] || []);
      setCategories(map["pantry-categories"] && map["pantry-categories"].length ? map["pantry-categories"] : DEFAULT_CATEGORIES);
      setCustomRecipes(map["custom-recipes"] || []);
      setReady(true);
    })();
    return () => { cancelled = true; clearTimeout(timeout); };
  }, []);

  // Live sync: pick up changes from other family members in real time.
  useEffect(() => {
    if (!supabaseClient) return;
    const channel = supabaseClient
      .channel("household_data_changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "household_data" }, (payload) => {
        const row = payload.new;
        if (!row) return;
        if (row.key === "grocery-list") setGrocery(row.value || []);
        if (row.key === "pantry-inventory") setPantry(row.value || []);
        if (row.key === "pantry-categories") setCategories(row.value && row.value.length ? row.value : DEFAULT_CATEGORIES);
        if (row.key === "custom-recipes") setCustomRecipes(row.value || []);
      })
      .subscribe();
    return () => { supabaseClient.removeChannel(channel); };
  }, []);

  useEffect(() => { if (ready) saveKeyRemote("grocery-list", grocery).catch(() => setSaveErr(true)); }, [grocery, ready]);
  useEffect(() => { if (ready) saveKeyRemote("pantry-inventory", pantry).catch(() => setSaveErr(true)); }, [pantry, ready]);
  useEffect(() => { if (ready) saveKeyRemote("pantry-categories", categories).catch(() => setSaveErr(true)); }, [categories, ready]);
  useEffect(() => { if (ready) saveKeyRemote("custom-recipes", customRecipes).catch(() => setSaveErr(true)); }, [customRecipes, ready]);

  const addCategory = useCallback((name) => {
    const trimmed = name.trim();
    if (!trimmed) return null;
    let finalName = trimmed;
    setCategories((cur) => {
      const existing = cur.find((c) => norm(c) === norm(trimmed));
      if (existing) { finalName = existing; return cur; }
      const withoutOther = cur.filter((c) => c !== "Other");
      const hasOther = cur.includes("Other");
      return hasOther ? [...withoutOther, trimmed, "Other"] : [...withoutOther, trimmed];
    });
    return finalName;
  }, []);

  const pantryNames = useMemo(() => pantry.map((p) => norm(p.name)), [pantry]);

  const addGroceryItem = useCallback((name, qty) => {
    if (!name.trim()) return;
    setGrocery((cur) => [{ id: uid(), name: name.trim(), qty: qty?.trim() || "", checked: false }, ...cur]);
  }, []);
  const toggleGrocery = useCallback((id) => {
    setGrocery((cur) => cur.map((it) => (it.id === id ? { ...it, checked: !it.checked } : it)));
  }, []);
  const removeGrocery = useCallback((id) => setGrocery((cur) => cur.filter((it) => it.id !== id)), []);
  const updateGroceryQty = useCallback((id, qty) => {
    setGrocery((cur) => cur.map((it) => (it.id === id ? { ...it, qty } : it)));
  }, []);
  const clearChecked = useCallback(() => setGrocery((cur) => cur.filter((it) => !it.checked)), []);
  const moveCheckedToPantry = useCallback(() => {
    setGrocery((cur) => {
      const checked = cur.filter((it) => it.checked);
      if (checked.length) {
        setPantry((p) => [...checked.map((it) => ({ id: uid(), name: it.name, qty: it.qty || "1", category: "Other" })), ...p]);
      }
      return cur.filter((it) => !it.checked);
    });
  }, []);

  const addPantryItem = useCallback((name, qty, category) => {
    if (!name.trim()) return;
    setPantry((cur) => [{ id: uid(), name: name.trim(), qty: qty?.trim() || "1", category: category || "Other" }, ...cur]);
  }, []);
  const removePantryItem = useCallback((id) => setPantry((cur) => cur.filter((it) => it.id !== id)), []);
  const updatePantryQty = useCallback((id, qty) => {
    setPantry((cur) => cur.map((it) => (it.id === id ? { ...it, qty } : it)));
  }, []);

  const addMissingToGrocery = useCallback((missing) => {
    setGrocery((cur) => {
      const existing = new Set(cur.map((c) => norm(c.name)));
      const toAdd = missing.filter((m) => !existing.has(norm(m))).map((m) => ({ id: uid(), name: m, qty: "", checked: false }));
      return [...toAdd, ...cur];
    });
  }, []);

  const addRecipe = useCallback((name, time, ingredients, instructions) => {
    const cleanName = name.trim();
    const cleanIngredients = ingredients.map((i) => i.trim()).filter(Boolean);
    if (!cleanName || cleanIngredients.length === 0) return;
    setCustomRecipes((cur) => [
      { id: uid(), name: cleanName, time: time.trim() || "—", ingredients: cleanIngredients, instructions: instructions.trim(), isCustom: true },
      ...cur,
    ]);
  }, []);
  const removeRecipe = useCallback((id) => setCustomRecipes((cur) => cur.filter((r) => r.id !== id)), []);

  return (
    <div style={{ background: T.bg, minHeight: "100vh", fontFamily: "'Inter', sans-serif", color: T.cream }} className="w-full">
      <style>{`
        ::selection { background: ${T.mustard}; color: ${T.ink}; }
        input::placeholder, textarea::placeholder { color: ${T.inkSoft}; opacity: 0.7; }
        .disp { font-family: 'Fraunces', serif; }
        .mono { font-family: 'Space Mono', monospace; }
        @keyframes riseIn { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:none;} }
        .riseIn { animation: riseIn 0.28s ease both; }
      `}</style>

      {!SUPABASE_READY && (
        <div className="text-center text-xs py-2 px-4" style={{ background: T.tomato, color: T.paper }}>
          Not connected to shared storage yet — edit config.js with your Supabase credentials. Changes won't be saved until then.
        </div>
      )}

      <Header tab={tab} setTab={setTab} counts={{ grocery: grocery.filter((g) => !g.checked).length, pantry: pantry.length }} />

      <main className="max-w-3xl mx-auto px-4 pb-24 pt-6">
        {tab === "grocery" ? (
          <GroceryTab items={grocery} onAdd={addGroceryItem} onToggle={toggleGrocery} onRemove={removeGrocery} onClearChecked={clearChecked} onMoveToPantry={moveCheckedToPantry} onUpdateQty={updateGroceryQty} />
        ) : tab === "pantry" ? (
          <PantryTab items={pantry} categories={categories} onAdd={addPantryItem} onRemove={removePantryItem} onAddCategory={addCategory} onUpdateQty={updatePantryQty} />
        ) : (
          <RecipesTab pantryNames={pantryNames} customRecipes={customRecipes} onAddMissing={addMissingToGrocery} onAddRecipe={addRecipe} onRemoveRecipe={removeRecipe} />
        )}
      </main>

      {saveErr && (
        <div className="fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg text-sm" style={{ background: T.tomato, color: T.paper }}>
          Couldn't save changes. Check your connection.
        </div>
      )}
    </div>
  );
}

/* ---------- HEADER / NAV ---------- */
function Header({ tab, setTab, counts }) {
  const tabs = [
    { key: "grocery", label: "Grocery List", icon: ShoppingCart, count: counts.grocery },
    { key: "pantry", label: "Pantry", icon: Package, count: counts.pantry },
    { key: "recipes", label: "Recipes", icon: ChefHat, count: null },
  ];
  return (
    <header style={{ borderBottom: `1px solid ${T.line}` }}>
      <div className="max-w-3xl mx-auto px-4 pt-8 pb-5 flex items-baseline justify-between">
        <div>
          <h1 className="disp text-3xl font-bold tracking-tight" style={{ color: T.mustard }}>Grocery Buddy</h1>
          <p className="text-xs mt-1 opacity-60">Your personal grocery assistant</p>
        </div>
      </div>
      <nav className="max-w-3xl mx-auto px-4 flex gap-1">
        {tabs.map(({ key, label, icon: TabIcon, count }) => {
          const active = tab === key;
          return (
            <button key={key} onClick={() => setTab(key)} className="flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors"
              style={{ background: active ? T.paper : "transparent", color: active ? T.ink : T.cream, opacity: active ? 1 : 0.65 }}>
              <TabIcon size={15} />
              {label}
              {count != null && count > 0 && (
                <span className="mono text-[10px] px-1.5 py-0.5 rounded-full" style={{ background: active ? T.mustard : "rgba(244,239,222,0.15)", color: active ? T.ink : T.cream }}>{count}</span>
              )}
            </button>
          );
        })}
      </nav>
    </header>
  );
}

/* ---------- GROCERY TAB ---------- */
function GroceryTab({ items, onAdd, onToggle, onRemove, onClearChecked, onMoveToPantry, onUpdateQty }) {
  const [name, setName] = useState("");
  const [qty, setQty] = useState("");
  const checkedCount = items.filter((i) => i.checked).length;

  const submit = (e) => { e.preventDefault(); onAdd(name, qty); setName(""); setQty(""); };

  const unchecked = useMemo(() => items.filter((i) => !i.checked).sort((a, b) => a.name.localeCompare(b.name)), [items]);
  const checked = useMemo(() => items.filter((i) => i.checked).sort((a, b) => a.name.localeCompare(b.name)), [items]);

  return (
    <div className="riseIn">
      <div className="flex gap-2 mb-6">
        <input value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)}
          placeholder="Add an item…" className="flex-1 px-4 py-3 rounded-lg outline-none text-sm" style={{ background: T.paper, color: T.ink }} />
        <input value={qty} onChange={(e) => setQty(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)}
          placeholder="Qty" className="w-20 px-3 py-3 rounded-lg outline-none text-sm" style={{ background: T.paper, color: T.ink }} />
        <button type="button" onClick={submit} className="px-4 rounded-lg flex items-center justify-center" style={{ background: T.mustard, color: T.ink }}><Plus size={18} /></button>
      </div>

      <div className="rounded-xl overflow-hidden" style={{ background: T.paper }}>
        {items.length === 0 ? (
          <EmptyState text="Your list is empty. Add something you're out of." />
        ) : (
          <>
            {unchecked.map((it, i) => (
              <GroceryRow key={it.id} item={it} isLast={i === unchecked.length - 1 && checked.length === 0} onToggle={onToggle} onRemove={onRemove} onUpdateQty={onUpdateQty} />
            ))}
            {unchecked.length > 0 && checked.length > 0 && <div style={{ borderBottom: `1px dashed ${T.inkSoft}55` }} />}
            {checked.map((it, i) => (
              <GroceryRow key={it.id} item={it} isLast={i === checked.length - 1} onToggle={onToggle} onRemove={onRemove} onUpdateQty={onUpdateQty} />
            ))}
          </>
        )}
      </div>

      {checkedCount > 0 && (
        <div className="flex gap-2 mt-4 justify-end">
          <button onClick={onMoveToPantry} className="text-xs px-3 py-2 rounded-lg flex items-center gap-1.5 font-medium" style={{ background: T.sage, color: T.ink }}>
            Move {checkedCount} to pantry <ArrowRight size={13} />
          </button>
          <button onClick={onClearChecked} className="text-xs px-3 py-2 rounded-lg font-medium" style={{ background: "rgba(244,239,222,0.12)", color: T.cream }}>Clear checked</button>
        </div>
      )}
    </div>
  );
}

function GroceryRow({ item, isLast, onToggle, onRemove, onUpdateQty }) {
  const numeric = /^\d+(\.\d+)?$/.test((item.qty || "").trim());
  const step = (delta) => { if (!numeric) return; onUpdateQty(item.id, String(Math.max(0, parseFloat(item.qty) + delta))); };
  return (
    <div className="flex items-center gap-3 px-4 py-2.5 group" style={{ borderBottom: isLast ? "none" : `1px solid ${T.paperDim}` }}>
      <button onClick={() => onToggle(item.id)} className="w-5 h-5 rounded-full flex items-center justify-center shrink-0 border-2"
        style={{ borderColor: item.checked ? T.sage : T.inkSoft, background: item.checked ? T.sage : "transparent" }}>
        {item.checked && <Check size={12} color={T.paper} strokeWidth={3} />}
      </button>
      <span className="flex-1 text-sm truncate" style={{ color: T.ink, textDecoration: item.checked ? "line-through" : "none", opacity: item.checked ? 0.5 : 1 }}>{item.name}</span>
      <div className="flex items-center gap-1 shrink-0">
        <button type="button" onClick={() => step(-1)} disabled={!numeric} className="w-6 h-6 rounded flex items-center justify-center disabled:opacity-20" style={{ background: T.paperDim, color: T.inkSoft }}><Minus size={11} /></button>
        <input value={item.qty} onChange={(e) => onUpdateQty(item.id, e.target.value)} placeholder="—" className="w-14 text-center mono text-xs px-1 py-1.5 rounded outline-none" style={{ background: T.paperDim, color: T.ink }} />
        <button type="button" onClick={() => step(1)} disabled={!numeric} className="w-6 h-6 rounded flex items-center justify-center disabled:opacity-20" style={{ background: T.paperDim, color: T.inkSoft }}><Plus size={11} /></button>
      </div>
      <button onClick={() => onRemove(item.id)} className="opacity-0 group-hover:opacity-100 transition-opacity shrink-0" style={{ color: T.tomato }}><X size={15} /></button>
    </div>
  );
}

/* ---------- PANTRY TAB ---------- */
const NEW_CATEGORY_VALUE = "__new__";

function PantryTab({ items, categories, onAdd, onRemove, onAddCategory, onUpdateQty }) {
  const [name, setName] = useState("");
  const [qty, setQty] = useState("");
  const [category, setCategory] = useState(categories[0] || "Other");
  const [addingCategory, setAddingCategory] = useState(false);
  const [newCategoryName, setNewCategoryName] = useState("");

  useEffect(() => { if (!categories.includes(category)) setCategory(categories[0] || "Other"); }, [categories]);

  const submit = (e) => { e.preventDefault(); onAdd(name, qty, category); setName(""); setQty(""); };

  const handleCategorySelect = (e) => {
    const val = e.target.value;
    if (val === NEW_CATEGORY_VALUE) setAddingCategory(true); else setCategory(val);
  };
  const confirmNewCategory = () => {
    const trimmed = newCategoryName.trim();
    if (!trimmed) { setAddingCategory(false); return; }
    const finalName = onAddCategory(trimmed);
    setCategory(finalName || trimmed);
    setNewCategoryName(""); setAddingCategory(false);
  };
  const cancelNewCategory = () => { setNewCategoryName(""); setAddingCategory(false); };

  const grouped = useMemo(() => {
    const m = {};
    categories.forEach((c) => (m[c] = []));
    items.forEach((it) => { if (!m[it.category]) m[it.category] = []; m[it.category].push(it); });
    Object.keys(m).forEach((c) => m[c].sort((a, b) => a.name.localeCompare(b.name)));
    return m;
  }, [items, categories]);

  return (
    <div className="riseIn">
      <div className="flex flex-wrap gap-2 mb-3">
        <input value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)}
          placeholder="Add to pantry…" className="flex-1 min-w-[140px] px-4 py-3 rounded-lg outline-none text-sm" style={{ background: T.paper, color: T.ink }} />
        <input value={qty} onChange={(e) => setQty(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)}
          placeholder="Qty" className="w-20 px-3 py-3 rounded-lg outline-none text-sm" style={{ background: T.paper, color: T.ink }} />
        <select value={category} onChange={handleCategorySelect} className="px-3 py-3 rounded-lg outline-none text-sm" style={{ background: T.paper, color: T.ink }}>
          {categories.map((c) => <option key={c} value={c}>{c}</option>)}
          <option value={NEW_CATEGORY_VALUE}>+ Add new category…</option>
        </select>
        <button type="button" onClick={submit} className="px-4 rounded-lg flex items-center justify-center" style={{ background: T.mustard, color: T.ink }}><Plus size={18} /></button>
      </div>

      {addingCategory && (
        <div className="flex gap-2 mb-6">
          <input autoFocus value={newCategoryName} onChange={(e) => setNewCategoryName(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") confirmNewCategory(); if (e.key === "Escape") cancelNewCategory(); }}
            placeholder="New category name…" className="flex-1 min-w-[140px] px-4 py-2.5 rounded-lg outline-none text-sm" style={{ background: T.paperDim, color: T.ink }} />
          <button type="button" onClick={confirmNewCategory} className="px-3 rounded-lg flex items-center justify-center" style={{ background: T.sage, color: T.ink }}><Check size={16} /></button>
          <button type="button" onClick={cancelNewCategory} className="px-3 rounded-lg flex items-center justify-center" style={{ background: "rgba(244,239,222,0.12)", color: T.cream }}><X size={16} /></button>
        </div>
      )}
      {!addingCategory && <div className="mb-3" />}

      {items.length === 0 ? (
        <div className="rounded-xl overflow-hidden" style={{ background: T.paper }}><EmptyState text="Nothing logged yet. Add what's already in your kitchen." /></div>
      ) : (
        <div className="space-y-5">
          {categories.filter((c) => grouped[c] && grouped[c].length > 0).map((c) => (
            <div key={c}>
              <div className="flex items-baseline justify-between mb-2">
                <div className="text-xs font-semibold mono tracking-wide uppercase opacity-60">{c}</div>
                <div className="text-xs mono opacity-40">{grouped[c].length}</div>
              </div>
              <div className="rounded-xl overflow-hidden" style={{ background: T.paper }}>
                {grouped[c].map((it, i) => (
                  <PantryRow key={it.id} item={it} isLast={i === grouped[c].length - 1} onRemove={onRemove} onUpdateQty={onUpdateQty} />
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PantryRow({ item, isLast, onRemove, onUpdateQty }) {
  const numeric = /^\d+(\.\d+)?$/.test(item.qty.trim());
  const step = (delta) => { if (!numeric) return; onUpdateQty(item.id, String(Math.max(0, parseFloat(item.qty) + delta))); };
  return (
    <div className="flex items-center gap-3 px-4 py-2.5 group" style={{ borderBottom: isLast ? "none" : `1px solid ${T.paperDim}` }}>
      <span className="flex-1 text-sm truncate" style={{ color: T.ink }}>{item.name}</span>
      <div className="flex items-center gap-1 shrink-0">
        <button type="button" onClick={() => step(-1)} disabled={!numeric} className="w-6 h-6 rounded flex items-center justify-center disabled:opacity-20" style={{ background: T.paperDim, color: T.inkSoft }}><Minus size={11} /></button>
        <input value={item.qty} onChange={(e) => onUpdateQty(item.id, e.target.value)} className="w-14 text-center mono text-xs px-1 py-1.5 rounded outline-none" style={{ background: T.paperDim, color: T.ink }} />
        <button type="button" onClick={() => step(1)} disabled={!numeric} className="w-6 h-6 rounded flex items-center justify-center disabled:opacity-20" style={{ background: T.paperDim, color: T.inkSoft }}><Plus size={11} /></button>
      </div>
      <button onClick={() => onRemove(item.id)} className="opacity-0 group-hover:opacity-100 transition-opacity shrink-0" style={{ color: T.tomato }}><X size={14} /></button>
    </div>
  );
}

/* ---------- RECIPES TAB ---------- */
function RecipesTab({ pantryNames, customRecipes, onAddMissing, onAddRecipe, onRemoveRecipe }) {
  const [query, setQuery] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [selectedId, setSelectedId] = useState(null);

  const allRecipes = useMemo(() => [...customRecipes, ...RECIPES], [customRecipes]);

  const scored = useMemo(() => {
    return allRecipes
      .map((r) => {
        const have = r.ingredients.filter((ing) => fuzzyHas(pantryNames, ing));
        const missing = r.ingredients.filter((ing) => !fuzzyHas(pantryNames, ing));
        return { ...r, haveCount: have.length, missing, total: r.ingredients.length };
      })
      .filter((r) => r.name.toLowerCase().includes(query.toLowerCase()))
      .sort((a, b) => b.haveCount / b.total - a.haveCount / a.total || a.missing.length - b.missing.length);
  }, [allRecipes, pantryNames, query]);

  const selected = scored.find((r) => r.id === selectedId) || null;

  if (selected) {
    return <div className="riseIn"><RecipeDetailView recipe={selected} onBack={() => setSelectedId(null)} onAddMissing={onAddMissing} /></div>;
  }

  return (
    <div className="riseIn">
      <div className="flex gap-2 mb-3">
        <div className="relative flex-1">
          <Search size={15} className="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40" style={{ color: T.ink }} />
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search recipes…" className="w-full pl-10 pr-4 py-3 rounded-lg outline-none text-sm" style={{ background: T.paper, color: T.ink }} />
        </div>
        <button type="button" onClick={() => setShowForm((s) => !s)} className="px-4 rounded-lg flex items-center gap-1.5 text-sm font-medium shrink-0" style={{ background: showForm ? T.paperDim : T.mustard, color: T.ink }}>
          {showForm ? <><X size={16} /> Cancel</> : <><Plus size={16} /> Add recipe</>}
        </button>
      </div>

      {showForm && (
        <AddRecipeForm onSave={(name, time, ingredients, instructions) => { onAddRecipe(name, time, ingredients, instructions); setShowForm(false); }} onCancel={() => setShowForm(false)} />
      )}

      {pantryNames.length === 0 && (
        <p className="text-xs opacity-60 mb-4">Your pantry is empty — every recipe will show as missing everything. Log a few staples for better matches.</p>
      )}

      <div className="grid gap-3 sm:grid-cols-2">
        {scored.map((r) => (
          <RecipeCard key={r.id} recipe={r} onOpen={() => setSelectedId(r.id)} onAddMissing={onAddMissing} onRemove={r.isCustom ? onRemoveRecipe : null} />
        ))}
      </div>
    </div>
  );
}

function AddRecipeForm({ onSave, onCancel }) {
  const [name, setName] = useState("");
  const [time, setTime] = useState("");
  const [ingredients, setIngredients] = useState([]);
  const [ingredientDraft, setIngredientDraft] = useState("");
  const [instructions, setInstructions] = useState("");

  const addIngredient = () => {
    const trimmed = ingredientDraft.trim();
    if (!trimmed) return;
    if (!ingredients.some((i) => norm(i) === norm(trimmed))) setIngredients((cur) => [...cur, trimmed]);
    setIngredientDraft("");
  };
  const removeIngredient = (ing) => setIngredients((cur) => cur.filter((i) => i !== ing));
  const canSave = name.trim() && ingredients.length > 0;

  return (
    <div className="rounded-xl p-4 mb-5" style={{ background: T.paper, color: T.ink }}>
      <div className="flex flex-col sm:flex-row gap-2 mb-3">
        <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Recipe name…" className="flex-1 min-w-0 px-3 py-2.5 rounded-lg outline-none text-sm" style={{ background: T.paperDim, color: T.ink }} />
        <input value={time} onChange={(e) => setTime(e.target.value)} placeholder="Time (e.g. 25 min)" className="w-full sm:w-32 min-w-0 px-3 py-2.5 rounded-lg outline-none text-sm" style={{ background: T.paperDim, color: T.ink }} />
      </div>
      <div className="flex gap-2 mb-2">
        <input value={ingredientDraft} onChange={(e) => setIngredientDraft(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addIngredient(); } }}
          placeholder="Add an ingredient, then Enter…" className="flex-1 px-3 py-2.5 rounded-lg outline-none text-sm" style={{ background: T.paperDim, color: T.ink }} />
        <button type="button" onClick={addIngredient} className="px-3 rounded-lg flex items-center justify-center" style={{ background: T.sage, color: T.ink }}><Plus size={16} /></button>
      </div>
      {ingredients.length > 0 && (
        <div className="flex flex-wrap gap-1.5 mb-3">
          {ingredients.map((ing) => (
            <span key={ing} className="flex items-center gap-1 pl-2.5 pr-1.5 py-1 rounded-full text-xs" style={{ background: T.paperDim, color: T.ink }}>
              {ing}
              <button type="button" onClick={() => removeIngredient(ing)} style={{ color: T.tomato }}><X size={11} /></button>
            </span>
          ))}
        </div>
      )}
      <textarea value={instructions} onChange={(e) => setInstructions(e.target.value)} placeholder="Instructions (optional)…" rows={3}
        className="w-full px-3 py-2.5 rounded-lg outline-none text-sm mb-3 resize-none" style={{ background: T.paperDim, color: T.ink }} />
      <div className="flex gap-2 justify-end">
        <button type="button" onClick={onCancel} className="text-xs px-3 py-2 rounded-lg font-medium" style={{ background: T.paperDim, color: T.inkSoft }}>Cancel</button>
        <button type="button" disabled={!canSave} onClick={() => onSave(name, time, ingredients, instructions)} className="text-xs px-3 py-2 rounded-lg font-medium"
          style={{ background: canSave ? T.mustard : T.paperDim, color: canSave ? T.ink : T.inkSoft, opacity: canSave ? 1 : 0.6 }}>Save recipe</button>
      </div>
    </div>
  );
}

function RecipeCard({ recipe, onOpen, onAddMissing, onRemove }) {
  const ready = recipe.missing.length === 0;
  return (
    <div onClick={onOpen} className="rounded-xl p-4 relative cursor-pointer transition-transform active:scale-[0.98]" style={{ background: T.paper, color: T.ink }}>
      <div className="flex items-start justify-between gap-2 mb-1">
        <h3 className="disp text-lg font-semibold leading-tight">{recipe.name}</h3>
        <div className="flex items-center gap-1.5 shrink-0">
          {ready && <span className="mono text-[10px] px-1.5 py-0.5 rounded" style={{ background: T.sage, color: T.ink }}>READY</span>}
          {onRemove && (
            <button onClick={(e) => { e.stopPropagation(); onRemove(recipe.id); }} style={{ color: T.tomato }} title="Remove recipe"><Trash2 size={14} /></button>
          )}
        </div>
      </div>
      <div className="text-xs opacity-60 mb-3">{recipe.time}{recipe.isCustom && " · your recipe"}</div>
      <div className="flex gap-1 mb-3">
        {recipe.ingredients.map((ing) => {
          const has = !recipe.missing.includes(ing);
          return <span key={ing} className="w-2 h-2 rounded-full" style={{ background: has ? T.sage : T.paperDim, border: has ? "none" : `1px solid ${T.inkSoft}55` }} title={ing} />;
        })}
      </div>
      <p className="text-xs mb-3" style={{ color: T.inkSoft }}>
        <span className="font-semibold">{recipe.haveCount}</span> of {recipe.total} ingredients on hand
        {recipe.missing.length > 0 && <> — missing <span className="italic">{recipe.missing.join(", ")}</span></>}
      </p>
      {recipe.missing.length > 0 && (
        <button onClick={(e) => { e.stopPropagation(); onAddMissing(recipe.missing); }} className="text-xs px-3 py-1.5 rounded-lg font-medium flex items-center gap-1.5" style={{ background: T.mustard, color: T.ink }}>
          Add missing to list <Plus size={12} />
        </button>
      )}
    </div>
  );
}

function RecipeDetailView({ recipe, onBack, onAddMissing }) {
  const ready = recipe.missing.length === 0;
  return (
    <div className="rounded-xl p-5" style={{ background: T.paper, color: T.ink }}>
      <button type="button" onClick={onBack} className="flex items-center gap-1 text-xs font-medium mb-4 opacity-60 hover:opacity-100" style={{ color: T.ink }}>
        <ArrowRight size={13} style={{ transform: "rotate(180deg)" }} /> Back to recipes
      </button>
      <h2 className="disp text-2xl font-bold leading-tight mb-1">{recipe.name}</h2>
      <div className="text-xs opacity-60 mb-4 flex items-center gap-2">
        <span>{recipe.time}</span>
        {recipe.isCustom && <span>· your recipe</span>}
        {ready && <span className="mono text-[10px] px-1.5 py-0.5 rounded" style={{ background: T.sage, color: T.ink }}>READY</span>}
      </div>
      <div className="text-xs font-semibold mono tracking-wide uppercase mb-2 opacity-60">Ingredients</div>
      <ul className="mb-4 space-y-1.5">
        {recipe.ingredients.map((ing) => {
          const has = !recipe.missing.includes(ing);
          return (
            <li key={ing} className="flex items-center gap-2 text-sm">
              <span className="w-4 h-4 rounded-full flex items-center justify-center shrink-0" style={{ background: has ? T.sage : T.paperDim, border: has ? "none" : `1px solid ${T.inkSoft}55` }}>
                {has && <Check size={10} color={T.paper} strokeWidth={3} />}
              </span>
              <span style={{ opacity: has ? 1 : 0.7 }}>{ing}</span>
              {!has && <span className="mono text-[10px] px-1.5 py-0.5 rounded ml-auto" style={{ background: T.paperDim, color: T.inkSoft }}>missing</span>}
            </li>
          );
        })}
      </ul>
      {recipe.instructions && (
        <>
          <div className="text-xs font-semibold mono tracking-wide uppercase mb-2 opacity-60">Instructions</div>
          <p className="text-sm mb-4 leading-relaxed" style={{ color: T.inkSoft }}>{recipe.instructions}</p>
        </>
      )}
      {recipe.missing.length > 0 && (
        <button onClick={() => onAddMissing(recipe.missing)} className="w-full text-sm px-4 py-3 rounded-lg font-medium flex items-center justify-center gap-1.5" style={{ background: T.mustard, color: T.ink }}>
          Add missing to list <Plus size={14} />
        </button>
      )}
    </div>
  );
}

function EmptyState({ text }) {
  return <div className="text-center py-14 px-6 text-sm" style={{ color: "#5B5A47" }}>{text}</div>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GroceryBuddy />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
